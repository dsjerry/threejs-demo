<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cube" x1="16" y1="12" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 3D 立方体线框 -->
  <!-- 前面 -->
  <polygon points="20,24 38,18 38,40 20,46" fill="rgba(255,255,255,0.15)" stroke="url(#cube)" stroke-width="2" stroke-linejoin="round"/>
  <!-- 右面 -->
  <polygon points="38,18 52,26 52,48 38,40" fill="rgba(255,255,255,0.08)" stroke="url(#cube)" stroke-width="2" stroke-linejoin="round"/>
  <!-- 顶面 -->
  <polygon points="20,24 34,16 52,26 38,18" fill="rgba(255,255,255,0.22)" stroke="url(#cube)" stroke-width="2" stroke-linejoin="round"/>
  <!-- 发光点缀 -->
  <circle cx="20" cy="24" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="52" cy="26" r="2" fill="white" opacity="0.6"/>
  <circle cx="34" cy="16" r="2" fill="white" opacity="0.7"/>
</svg>
